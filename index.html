<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parques Auxiliares - Dashboard Control Trafico</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/colreorder/1.7.0/css/colReorder.dataTables.min.css">
<script src="https://cdn.datatables.net/colreorder/1.7.0/js/dataTables.colReorder.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/colresizable/1.6.0/colResizable-1.6.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>⚡ Control Tráfico</h1>
  <button id="btnAtras" disabled>◀ Atrás</button>
  <button id="btnAdelante" disabled>Adelante ▶</button>
  <button id="btnLimpiar">✕ Limpiar filtros</button>
  <button id="toggleModo">☀ Modo claro</button>
</div>

<div class="controls">
  <label>Fecha inicio: <input type="date" id="fechaInicio"></label>
  <label>Fecha fin: <input type="date" id="fechaFin"></label>
</div>

<div class="filtros-activos" id="filtrosActivos"></div>

<div class="kpi-container">
  <div class="kpi">Total averías<span id="totalAverias">0</span></div>
  <div class="kpi">Promedio diario<span id="promedioDiario">0</span></div>
  <div class="kpi">Vehículo top<span id="vehiculoTop">-</span></div>
</div>

<div class="charts-wrapper">

  <div class="chart-row" id="row-1">
    <div class="chart-panel" id="panel-familia">
      <div class="panel-header">
        <span class="panel-title">Familia Avería</span>
        <button class="btn-filtro-panel" data-campo="FAMILIA AVERIA">⊟</button>
      </div>
      <canvas id="graficoFamilia"></canvas>
      <div class="resize-handle" data-panel="panel-familia"></div>
      <div class="resize-handle-e" data-panel="panel-familia" data-row="row-1"></div>
      <div class="resize-handle-se" data-panel="panel-familia" data-row="row-1"></div>
    </div>
    <div class="chart-panel" id="panel-turno">
      <div class="panel-header">
        <span class="panel-title">Turno</span>
        <button class="btn-filtro-panel" data-campo="TURNO">⊟</button>
      </div>
      <canvas id="graficoTurno"></canvas>
      <div class="resize-handle" data-panel="panel-turno"></div>
      <div class="resize-handle-e" data-panel="panel-turno" data-row="row-1"></div>
      <div class="resize-handle-se" data-panel="panel-turno" data-row="row-1"></div>
    </div>
  </div>

  <div class="chart-row" id="row-2">
    <div class="chart-panel" id="panel-origen">
      <div class="panel-header">
        <span class="panel-title">Origen Aviso</span>
        <button class="btn-filtro-panel" data-campo="ORIGEN AVISO">⊟</button>
      </div>
      <canvas id="graficoOrigen"></canvas>
      <div class="resize-handle" data-panel="panel-origen"></div>
      <div class="resize-handle-e" data-panel="panel-origen" data-row="row-2"></div>
      <div class="resize-handle-se" data-panel="panel-origen" data-row="row-2"></div>
    </div>
    <div class="chart-panel" id="panel-familiaVeh">
      <div class="panel-header">
        <span class="panel-title">Familia Vehículo</span>
        <button class="btn-filtro-panel" data-campo="FAMILIA">⊟</button>
      </div>
      <canvas id="graficoFamiliaVeh"></canvas>
      <div class="resize-handle" data-panel="panel-familiaVeh"></div>
      <div class="resize-handle-e" data-panel="panel-familiaVeh" data-row="row-2"></div>
      <div class="resize-handle-se" data-panel="panel-familiaVeh" data-row="row-2"></div>
    </div>
  </div>

  <div class="chart-row" id="row-3">
    <div class="chart-panel wide" id="panel-vhlo">
      <div class="panel-header">
        <span class="panel-title">Vehículo (VHLO)</span>
        <button class="btn-filtro-panel" data-campo="VHLO">⊟</button>
      </div>
      <canvas id="graficoVHLO"></canvas>
      <div class="resize-handle" data-panel="panel-vhlo"></div>
    </div>
  </div>

  <div class="chart-row" id="row-4">
    <div class="chart-panel wide" id="panel-descripcion">
      <div class="panel-header">
        <span class="panel-title">Ranking Descripción Avería</span>
        <button class="btn-filtro-panel" data-campo="_DESCRIPCION_NORM">⊟</button>
      </div>
      <canvas id="graficoDescripcion"></canvas>
      <div class="resize-handle" data-panel="panel-descripcion"></div>
    </div>
  </div>

  <div class="chart-row" id="row-5">
    <div class="chart-panel wide" id="panel-evolucion">
      <div class="panel-header">
        <span class="panel-title">Evolución mensual por familia</span>
        <button class="btn-filtro-panel" data-campo="FAMILIA AVERIA">⊟</button>
      </div>
      <canvas id="graficoEvolucion"></canvas>
      <div class="resize-handle" data-panel="panel-evolucion"></div>
    </div>
  </div>

</div>

<div style="margin-bottom:8px;">
  <button id="btnColumnas">☰ Columnas visibles</button>
  <button id="btnAleatorio">🔀 Orden aleatorio</button>
</div>
<table id="tablaAverias" class="display" width="100%"></table>

<script src="script.js"></script>
</body>
</html>
